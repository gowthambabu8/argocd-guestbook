name: 10-matric-conditions
on: 
  workflow_dispatch:

concurrency: 
  group: ${{github.workflow}} - ${{github.ref}}
  cancel-in-progress: true
  
jobs:
  matrix-job:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        number: [1,2]
        letter: [a,b,c]
        exclude:
          - number: 1
          - letter: c
    timeout-minutes: 1

    steps:
      - name: Displaying number - letter
        run: |
          echo "Number :: ${{ matrix.number }}"
          echo "Letter :: ${{ matrix.letter }}"

      - name: skip number 1 with letter c
        if: ${{ !(matrix.number == 1 & matrix.letter == 'c') }}
        run: echo "This step executes for Number ${{matrix.number}} and Letter ${{matrix.letter}}"
  
  sleep-job:
    runs-on: ubuntu-24.04
    steps:
      - run: sleep 10
        timeout-minutes: 1