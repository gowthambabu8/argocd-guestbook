name: Pass Data Between Jobs

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    # Step 1: Declare outputs at the job level
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      build_time: ${{ steps.meta.outputs.timestamp }}
      commit_sha: ${{ steps.meta.outputs.sha }}
      project_name: ${{ steps.meta.outputs.PROJECT }}
    steps:
      - uses: actions/checkout@v4

      # Step 2: Write to $GITHUB_OUTPUT in a step with an id
      - name: Generate metadata
        id: meta
        run: |
          echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "PROJECT=ROBOSHOP" >> "$GITHUB_OUTPUT"

      - name: Show what was generated
        run: |
          echo "Tag: ${{ steps.meta.outputs.tag }}"
          echo "Time: ${{ steps.meta.outputs.timestamp }}"

  test:
    needs: build                          # Step 3: declare dependency
    runs-on: ubuntu-latest
    outputs:
      project_component: ${{ steps.meta.outputs.component }}
    steps:
      - name: Use the build outputs
        run: |
          echo "Testing image: ${{ needs.build.outputs.image_tag }}"
          echo "Built at: ${{ needs.build.outputs.build_time }}"
          echo "From commit: ${{ needs.build.outputs.commit_sha }}"
          echo "Project Name: ${{ needs.build.outputs.project_name }}"
          echo "component=${{ needs.build.outputs.project_name }}_FRONTEND" >> "$GITHUB_OUTPUT"

  deploy:
    needs: [build, test]                  # Can depend on multiple jobs
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: |
          echo "Deploying ${{ needs.build.outputs.image_tag }}"
          echo "Project Component :: ${{ needs.test.outputs.project_component}}"