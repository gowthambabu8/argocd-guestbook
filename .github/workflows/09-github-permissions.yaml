name: 09-github-permissions
on: 
  workflow_dispatch:
    
jobs:
  pull-request-read:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5.0.0
      
      - name: Get existing PR's
        run: gh pr list --limit 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update label to existing PR
        env: 
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit 1 --add-label "documentation"

      - name: check if update completed.
        if: failure()
        run: echo "Write operation is blocked... token is read only"

  pull-request-write:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      issues: write
      repository-projects: write
      contents: write
    #continue-on-error: true
    steps:
      - uses: actions/checkout@v5.0.0
      
      - name: Get existing PR's
        run: gh pr list --limit 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update label to existing PR
        env: 
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit 1 --add-label "documentation"

      - name: On failure
        if: failure()
        run: echo "Write operation is blocked... token is read only"
      
      - name: On success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: success()
        run: | 
          echo "Write operation is completed.... token is read write"
          echo "===PR #1 VIEW"
          gh pr view 1 --json number,title,state,labels,url
          echo "===All labels"
          gh label list
          echo "==List Open PR=="
          OPEN_PR=$(gh pr list --state open --limit 1 --json number --jq '.[0].number')
          echo "Open PR number is $OPEN_PR"
          gh pr edit $OPEN_PR --add-label "documentation"
      